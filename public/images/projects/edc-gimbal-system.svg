<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="EDC tracking car and auto-aiming gimbal system diagram placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)" />

  <text x="80" y="85" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="34" font-weight="700">Tracking Car + Auto-Aiming Gimbal System</text>

  <rect x="95" y="165" width="290" height="145" rx="16" fill="#1e40af" fill-opacity="0.25" stroke="#93c5fd" stroke-width="2" />
  <text x="240" y="225" text-anchor="middle" fill="#dbeafe" font-family="Arial, sans-serif" font-size="24" font-weight="700">Vision Chain</text>
  <text x="240" y="260" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="20">K230 + OpenMV</text>

  <rect x="455" y="165" width="290" height="145" rx="16" fill="#374151" fill-opacity="0.35" stroke="#cbd5e1" stroke-width="2" />
  <text x="600" y="225" text-anchor="middle" fill="#f1f5f9" font-family="Arial, sans-serif" font-size="24" font-weight="700">Main Controller</text>
  <text x="600" y="260" text-anchor="middle" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="20">STM32</text>

  <rect x="815" y="165" width="290" height="145" rx="16" fill="#065f46" fill-opacity="0.26" stroke="#6ee7b7" stroke-width="2" />
  <text x="960" y="225" text-anchor="middle" fill="#d1fae5" font-family="Arial, sans-serif" font-size="24" font-weight="700">Actuation</text>
  <text x="960" y="260" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="20">Stepper Gimbal + PID</text>

  <line x1="385" y1="238" x2="455" y2="238" stroke="#94a3b8" stroke-width="3" />
  <polygon points="455,238 443,231 443,245" fill="#94a3b8" />
  <line x1="745" y1="238" x2="815" y2="238" stroke="#94a3b8" stroke-width="3" />
  <polygon points="815,238 803,231 803,245" fill="#94a3b8" />

  <rect x="190" y="385" width="820" height="180" rx="20" fill="#7c2d12" fill-opacity="0.23" stroke="#fdba74" stroke-width="2" />
  <text x="600" y="457" text-anchor="middle" fill="#fed7aa" font-family="Arial, sans-serif" font-size="26" font-weight="700">System-Level Integration Outcome</text>
  <text x="600" y="500" text-anchor="middle" fill="#ffedd5" font-family="Arial, sans-serif" font-size="21">Static drift &lt; 3 cm, jitter &lt; 1 cm; moving-base drift and jitter &lt; 10 cm</text>
</svg>
