<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tic-tac-toe robot system diagram placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)" />

  <text x="80" y="85" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="34" font-weight="700">Tic-Tac-Toe Human-Machine Robot System</text>

  <rect x="120" y="180" width="280" height="145" rx="16" fill="#1d4ed8" fill-opacity="0.22" stroke="#93c5fd" stroke-width="2" />
  <text x="260" y="240" text-anchor="middle" fill="#dbeafe" font-family="Arial, sans-serif" font-size="24" font-weight="700">Perception</text>
  <text x="260" y="274" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="19">K230 Board Recognition</text>

  <rect x="460" y="180" width="280" height="145" rx="16" fill="#7c3aed" fill-opacity="0.2" stroke="#c4b5fd" stroke-width="2" />
  <text x="600" y="240" text-anchor="middle" fill="#ede9fe" font-family="Arial, sans-serif" font-size="24" font-weight="700">Decision</text>
  <text x="600" y="274" text-anchor="middle" fill="#ddd6fe" font-family="Arial, sans-serif" font-size="19">Alpha-Beta Strategy</text>

  <rect x="800" y="180" width="280" height="145" rx="16" fill="#065f46" fill-opacity="0.24" stroke="#6ee7b7" stroke-width="2" />
  <text x="940" y="240" text-anchor="middle" fill="#d1fae5" font-family="Arial, sans-serif" font-size="24" font-weight="700">Execution</text>
  <text x="940" y="274" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="19">3-Axis Stepper + Magnet</text>

  <line x1="400" y1="250" x2="460" y2="250" stroke="#94a3b8" stroke-width="3" />
  <polygon points="460,250 448,243 448,257" fill="#94a3b8" />
  <line x1="740" y1="250" x2="800" y2="250" stroke="#94a3b8" stroke-width="3" />
  <polygon points="800,250 788,243 788,257" fill="#94a3b8" />

  <rect x="240" y="390" width="720" height="175" rx="20" fill="#0f766e" fill-opacity="0.2" stroke="#5eead4" stroke-width="2" />
  <text x="600" y="460" text-anchor="middle" fill="#99f6e4" font-family="Arial, sans-serif" font-size="25" font-weight="700">Robust Interaction Modes</text>
  <text x="600" y="502" text-anchor="middle" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="20">Human-first / machine-first support, cheat recovery, and automatic piece reset</text>
